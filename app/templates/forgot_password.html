<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - MedApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #dde3ee;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 45px;
            width: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            color: #2d3fd3;
            font-weight: 700;
            font-size: 18px;
        }
        .logo-icon {
            width: 30px;
            height: 30px;
            background: #2d3fd3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
            width: 100%;
            margin-bottom: 15px;
        }
        .form-control:focus { border-color: #2d3fd3; outline: none; box-shadow: none; }
        .btn-submit {
            background-color: #2d3fd3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn-submit:hover { background-color: #1f2fa8; }
        .error {
            background: #f8d7da;
            color: #842029;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .success {
            background: #d1e7dd;
            color: #0f5132;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #2d3fd3;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">M</div>
        MedApp
    </div>

    <h2>Forgot Password?</h2>
    <p class="subtitle">Answer your security question to reset your password</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form action="/forgot_password" method="POST">
        <div>
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div>
            <label class="form-label">Which school did you study in?</label>
            <input type="text" name="security_answer" class="form-control" placeholder="Your school name" autocomplete="off" required>
        </div>
        <div>
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Min. 8 characters" required>
        </div>
        <button type="submit" class="btn-submit">Reset Password</button>
    </form>

    <a href="/login" class="back-link">← Back to Login</a>
</div>

</body>
</html>
