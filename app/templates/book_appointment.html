<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment - MedApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f0f2f8;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #2d3fd3;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
        }
        .logo-icon {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d3fd3;
            font-weight: bold;
            font-size: 18px;
        }
        .navbar-links { display: flex; gap: 15px; align-items: center; }
        .navbar-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
        }
        .navbar-links a:hover { background: rgba(255,255,255,0.2); }
        .navbar-links .logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .form-card h2 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .form-card p {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            display: block;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
            width: 100%;
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: #2d3fd3;
            outline: none;
        }
        .btn-book {
            background-color: #2d3fd3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-book:hover { background-color: #1f2fa8; }
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #2d3fd3;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/patient_dashboard" class="navbar-brand">
        <div class="logo-icon">M</div>
        MedApp
    </a>
    <div class="navbar-links">
    <a href="/search_doctors">Search Doctors</a>
    <a href="/my_appointments">My Appointments</a>
    <a href="/notifications" style="position:relative;">
        🔔
        {% if unread_count > 0 %}
        <span style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center;">{{ unread_count }}</span>
        {% endif %}
    </a>
    <a href="/logout" class="logout">Logout</a>
</div>
</div>

<!-- Main Content -->
<div class="container">
    <div class="form-card">
        <h2>📅 Book Appointment</h2>
        <p>Fill in the details to book your appointment</p>

        {% if error %}
        <div style="background:#f8d7da; color:#842029; padding:10px 15px; border-radius:10px; font-size:13px; margin-bottom:15px;">{{ error }}</div>
        {% endif %}

        <form action="/book_appointment" method="POST">
            <div>
                <label>Doctor ID</label>
                <input type="number" name="doctor_id" class="form-control" value="{{ doctor_id }}" required>
            </div>
            <div>
                <label>Appointment Date</label>
                <input type="date" name="appointment_date" class="form-control" required>
            </div>
            <div>
                <label>Appointment Time</label>
                <input type="time" name="appointment_time" class="form-control" required>
            </div>

            <button type="submit" class="btn-book">Book Appointment</button>
        </form>

        <a href="/patient_dashboard" class="back-link">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
