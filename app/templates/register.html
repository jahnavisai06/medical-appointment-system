<!DOCTYPE html>
<html>
<head>
    <title>Register - Medical Appointment System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #dde3ee;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-card {
            display: flex;
            width: 900px;
            height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .left-side {
            width: 45%;
            display: flex;
            flex-direction: column;
        }
        .doctor-image {
            width: 100%;
            height: 55%;
            object-fit: cover;
        }
        .blue-box {
            background-color: #2d3fd3;
            flex: 1;
            padding: 25px 30px;
            color: white;
        }
        .blue-box .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .blue-box .logo span {
            font-size: 16px;
            font-weight: 600;
        }
        .blue-box .logo-icon {
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .blue-box .logo-icon span {
            color: #2d3fd3;
            font-size: 16px;
            font-weight: bold;
        }
        .blue-box .divider {
            width: 3px;
            height: 50px;
            background: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }
        .blue-box h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .blue-box p {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }
        .right-side {
            width: 55%;
            background: white;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-side .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            color: #2d3fd3;
            font-weight: 700;
            font-size: 18px;
        }
        .right-side .logo-icon {
            width: 30px;
            height: 30px;
            background: #2d3fd3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .right-side .logo-icon span {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        .right-side h2 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .right-side p {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #2d3fd3;
            box-shadow: none;
        }
        .btn-register {
            background-color: #2d3fd3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            margin-top: 5px;
        }
        .btn-register:hover {
            background-color: #1f2fa8;
            color: white;
        }
        .login-text {
            font-size: 13px;
            color: #555;
            margin-top: 15px;
            text-align: center;
        }
        .login-text a {
            color: #2d3fd3;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-card">

    <!-- Left Side -->
    <div class="left-side">
        <img src="https://images.pexels.com/photos/4173239/pexels-photo-4173239.jpeg" alt="Doctor" class="doctor-image">
        <div class="blue-box">
            <div class="logo">
                <div class="logo-icon"><span>M</span></div>
                <span>MedApp</span>
            </div>
            <div class="divider"></div>
            <h2>Join MedApp<br>Medical Appointment System</h2>
            <p>Create your account and start booking appointments today.</p>
        </div>
    </div>

    <!-- Right Side -->
    <div class="right-side">
        <div class="logo">
            <div class="logo-icon"><span>M</span></div>
            <span>MedApp</span>
        </div>

        <h2>Create Account</h2>
        <p>Enter your details to register</p>

        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="Your phone number">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Which school did you study in?</label>
                <input type="text" name="security_answer" class="form-control" placeholder="Your school name" autocomplete="off" required>
            </div>

            <button type="submit" class="btn-register">Sign Up</button>
            
        </form>

        <p class="login-text">Already have an account? <a href="/login">Login now</a></p>
    </div>

</div>

</body>
</html>
